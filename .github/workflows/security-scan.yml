name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Biome Lint
        run: npx @biomejs/biome ci .

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        run: |
          ! grep -rn "API_KEY\|SECRET_KEY\|password" src/ --include="*.ts" --include="*.tsx" | grep -v "process.env" | grep -v ".test." | grep -v "// " || echo "No hardcoded secrets found"

      - name: Run security tests
        run: npx vitest run src/__tests__/security.test.ts
